<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="轻记 - 极简体重记录工具">
  <title>轻记 · 极简体重记录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="app-title">轻记</h1>
      <nav class="view-tabs" id="viewTabs">
        <button class="tab-btn active" data-view="calendar">日历</button>
        <button class="tab-btn" data-view="list">列表</button>
        <button class="tab-btn" data-view="chart">曲线</button>
      </nav>
    </header>

    <main class="app-main">
      <section id="calendarView" class="view-section active"></section>
      <section id="listView" class="view-section"></section>
      <section id="chartView" class="view-section"></section>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
